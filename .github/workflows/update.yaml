name: NNSE Signal Pipeline

# ============================================
# SCHEDULE: Every ~25 min, 6 AM to 7 PM IST, Mon-Fri
#
# IST to UTC:  6 AM IST = 00:30 UTC | 7 PM IST = 13:30 UTC
#
# Using 3 explicit crons (more reliable than */25)
# Runs at :00, :25, :50 of each hour
# ============================================

on:
  schedule:
    - cron: "0 0-13 * * 1-5"     # :00 every hour, Mon-Fri
    - cron: "20 0-13 * * 1-5"    # :20 every hour, Mon-Fri
    - cron: "40 0-13 * * 1-5"    # :40 every hour, Mon-Fri
  workflow_dispatch:              # Manual trigger button

# Prevent overlapping runs — cancel old run if new one starts
concurrency:
  group: signal-pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      # ── Setup ──
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials.json from secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      # ── IST Time Gate ──
      # Skip if outside 6 AM - 7 PM IST window
      - name: Check IST time window
        id: time_check
        run: |
          IST_HOUR=$(TZ="Asia/Kolkata" date +%H)
          echo "IST Hour: $IST_HOUR"
          if [ "$IST_HOUR" -ge 6 ] && [ "$IST_HOUR" -lt 19 ]; then
            echo "in_window=true" >> $GITHUB_OUTPUT
            echo "Within 6 AM - 7 PM IST window"
          else
            echo "in_window=false" >> $GITHUB_OUTPUT
            echo "Outside window - skipping"
          fi

      # ── Step 1: Scrape Data Sources ──
      - name: Scrape NSE announcements
        if: steps.time_check.outputs.in_window == 'true'
        run: python NNSE.py
        continue-on-error: true

      - name: Scrape BSE announcements
        if: steps.time_check.outputs.in_window == 'true'
        run: python BSE.py
        continue-on-error: true

      - name: Scrape Economic Times
        if: steps.time_check.outputs.in_window == 'true'
        run: python et.py
        continue-on-error: true

      - name: Scrape MoneyControl
        if: steps.time_check.outputs.in_window == 'true'
        run: python monc.py
        continue-on-error: true

      # ── Step 2: Signal Engines ──
      - name: Run consolidated AI analysis
        if: steps.time_check.outputs.in_window == 'true'
        run: python consolidated.py
        continue-on-error: true

      - name: Run WORDF v3 keyword engine
        if: steps.time_check.outputs.in_window == 'true'
        run: python words.py
        continue-on-error: true

      - name: Run legacy AI script
        if: steps.time_check.outputs.in_window == 'true'
        run: python ai.py
        continue-on-error: true

      # ── Step 3: Multi-AI v4 Signal Engine ──
      - name: Run Multi-AI v4 Signal Engine
        if: steps.time_check.outputs.in_window == 'true'
        run: python multi_ai.py

      # ── Step 4: Nifty Direction Bias ──
      - name: Run Nifty Move bias
        if: steps.time_check.outputs.in_window == 'true'
        run: python nifty_move.py
        continue-on-error: true
